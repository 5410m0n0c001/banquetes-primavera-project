<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Abril · Primavera Events</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
--bg:#0f1117; --bg2:#161b26; --bg3:#1e2535; --bg4:#252d3d;
--border:#2a3347; --border2:#3a4560;
--text:#e8edf5; --text2:#8b96b0; --text3:#5a6480;
--green:#22c55e; --green-bg:#102e1a; --green-border:#16532d;
--red:#ef4444; --red-bg:#2d1111; --red-border:#7f1d1d;
--amber:#f59e0b; --amber-bg:#2d1f08; --amber-border:#78350f;
--blue:#3b82f6; --blue-bg:#0d1f3d; --blue-border:#1e3a6e;
--accent:#6366f1;
}
* { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
body {
font-family: 'Inter', sans-serif;
background: var(--bg);
color: var(--text);
line-height: 1.5;
-webkit-font-smoothing: antialiased;
display: flex;
min-height: 100vh;
}
aside {
width: 220px;
background: var(--bg2);
border-right: 1px solid var(--border);
height: 100vh;
position: sticky;
top: 0;
display: flex;
flex-direction: column;
padding: 24px 0;
z-index: 100;
}
.logo-block { padding: 0 24px 32px; }
.logo-title { font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
.logo-period { font-size: 10px; color: var(--text3); text-transform: uppercase; margin-top: 4px; letter-spacing: 0.5px; }
.nav-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; padding: 0 24px 12px; letter-spacing: 1px; }
nav { flex: 1; overflow-y: auto; }
.nav-item {
display: flex; align-items: center; gap: 12px; padding: 10px 24px;
color: var(--text2); text-decoration: none; font-size: 12px; transition: 0.2s;
border-left: 2px solid transparent;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--bg3); color: var(--accent); border-left-color: var(--accent); }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot-exec { background: var(--blue); }
.dot-bench { background: #a855f7; }
.dot-fb { background: #06b6d4; }
.dot-multi { background: #ec4899; }
.dot-web { background: var(--blue); }
.dot-ops { background: var(--amber); }
.dot-video { background: var(--green); }
.dot-plan { background: #f97316; }
.dot-eval { background: var(--red); }
.aside-footer { padding: 24px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text3); }
main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
header {
position: sticky; top: 0; z-index: 50; background: var(--bg2);
border-bottom: 1px solid var(--border); padding: 10px 24px;
display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 20px; }
.header-title { font-size: 13px; font-weight: 500; }
.kpi-strip { display: flex; gap: 8px; }
.kpi-pill {
background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
padding: 6px 12px; display: flex; flex-direction: column; gap: 2px; min-width: 140px;
}
.kpi-h { font-size: 10px; text-transform: uppercase; color: var(--text3); font-weight: 600; }
.kpi-row { display: flex; align-items: center; gap: 8px; }
.kpi-v { font-size: 16px; font-weight: 500; }
.delta {
font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
display: flex; align-items: center; gap: 2px;
}
.delta.up { background: var(--green-bg); color: var(--green); }
.delta.down { background: var(--red-bg); color: var(--red); }
.toggle-group { display: flex; background: var(--bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
.toggle-btn {
padding: 4px 12px; border: none; background: transparent; color: var(--text2);
font-size: 11px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: 0.2s;
}
.toggle-btn.active { background: var(--accent); color: white; }
.content-scroller { padding: 24px; overflow-y: auto; flex: 1; }
.section { border: 1px solid var(--border); border-radius: 10px; background: var(--bg2); margin-bottom: 12px; overflow: hidden; }
.section-header {
padding: 14px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s;
border: none; background: none; width: 100%; text-align: left; color: inherit;
}
.section-header:hover { background: var(--bg3); }
.tag { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
.tag.blue { background: var(--blue-bg); color: var(--blue); }
.tag.purple { background: #2e1065; color: #a855f7; }
.tag.cyan { background: #083344; color: #06b6d4; }
.tag.pink { background: #500733; color: #ec4899; }
.tag.amber { background: var(--amber-bg); color: var(--amber); }
.tag.green { background: var(--green-bg); color: var(--green); }
.tag.orange { background: #431407; color: #f97316; }
.tag.red { background: var(--red-bg); color: var(--red); }
.s-title { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); }
.s-sub { font-size: 11px; color: var(--text3); }
.chevron { width: 16px; height: 16px; transition: 0.3s; color: var(--text3); flex-shrink: 0; }
.section.open .chevron { transform: rotate(180deg); }
.section-body { padding: 16px; border-top: 1px solid var(--border); display: none; background: var(--bg); }
.section.open .section-body { display: block; }
.grid { display: grid; gap: 16px; grid-template-columns: repeat(12, 1fr); margin-bottom: 16px; }
.col-3 { grid-column: span 3; }
.col-4 { grid-column: span 4; }
.col-6 { grid-column: span 6; }
.col-8 { grid-column: span 8; }
.col-12 { grid-column: span 12; }
.m-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.m-label { font-size: 10px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
.m-value { font-size: 22px; font-weight: 500; color: var(--text); }
.m-sub { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500; }
.b-green { background: var(--green-bg); color: var(--green); }
.b-red { background: var(--red-bg); color: var(--red); }
.b-amber { background: var(--amber-bg); color: var(--amber); }
.b-blue { background: var(--blue-bg); color: var(--blue); }
.t-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; margin-top: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--bg3); color: var(--text3); text-transform: uppercase; font-size: 10px; font-weight: 600; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
th.num { text-align: right; }
td { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
tr:last-child td { border-bottom: none; }
tr:nth-child(even) { background: var(--bg3); }
tr:nth-child(odd) { background: var(--bg2); }
tr:hover { background: var(--bg4); }
.name { color: var(--text); font-weight: 500; }
.num { text-align: right; font-variant-numeric: tabular-nums; color: var(--text); }
.r-ok { border-left: 2px solid var(--green) !important; }
.r-warn { border-left: 2px solid var(--amber) !important; }
.r-bad { border-left: 2px solid var(--red) !important; }
.p-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.p-label { font-size: 12px; color: var(--text2); width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-track { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
.p-fill { height: 100%; border-radius: 3px; }
.p-val { font-size: 11px; color: var(--text); width: 40px; text-align: right; font-variant-numeric: tabular-nums; }
.donut-box { display: flex; align-items: center; gap: 24px; padding: 12px 0; }
.c-leg { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.c-item { display: flex; align-items: center; gap: 10px; }
.swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.c-txt { font-size: 12px; color: var(--text2); flex: 1; }
.c-val { font-size: 12px; color: var(--text); font-weight: 500; }
.c-pct { font-size: 11px; color: var(--text3); width: 30px; text-align: right; }
.s-list { display: flex; flex-direction: column; }
.s-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.s-item:last-child { border-bottom: none; }
.si-ico { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.si-green { background: var(--green-bg); color: var(--green); }
.si-amber { background: var(--amber-bg); color: var(--amber); }
.si-red { background: var(--red-bg); color: var(--red); }
.si-blue { background: var(--blue-bg); color: var(--blue); }
.si-txt { flex: 1; font-size: 12px; color: var(--text2); }
.alert-box { background: var(--amber-bg); border-left: 4px solid var(--amber); padding: 12px 16px; border-radius: 0 8px 8px 0; margin-top: 16px; }
.alert-txt { font-size: 12px; color: var(--amber); line-height: 1.4; }
@media (max-width: 768px) {
body { flex-direction: column; }
aside { width: 100%; height: auto; position: fixed; bottom: 0; top: auto; border-right: none; border-top: 1px solid var(--border); flex-direction: row; padding: 0; }
.logo-block, .nav-label, .aside-footer { display: none; }
nav { display: flex; width: 100%; overflow-x: auto; }
.nav-item { flex-direction: column; padding: 8px; gap: 4px; font-size: 9px; min-width: 80px; text-align: center; border-left: none !important; border-bottom: 2px solid transparent; }
.nav-item.active { border-bottom-color: var(--accent); }
main { margin-bottom: 60px; }
.header-left { flex-direction: column; align-items: flex-start; gap: 8px; }
.col-3, .col-4, .col-6, .col-8 { grid-column: span 12; }
}
</style>
</head>
<body>
<aside>
<div class="logo-block"><div class="logo-title"><div class="logo-dot"></div> Primavera HQ</div><div class="logo-period">Reporte Abril 2026</div></div>
<div class="nav-label">Secciones</div>
<nav id="sidebar-nav"></nav>
<div class="aside-footer">Última actualización: Hoy 15:08</div>
</aside>
<main>
<header>
<div class="header-left"><div class="header-title">Dashboard Abril</div><div class="kpi-strip" id="kpi-strip"></div></div>
<div class="toggle-group">
<button class="toggle-btn active" id="btn-global" onclick="setMode('global')">Global</button>
<button class="toggle-btn" id="btn-section" onclick="setMode('section')">Por sección</button>
</div>
</header>
<div class="content-scroller" id="main-content"></div>
</main>
<script>
const sections = [
{id:'exec', tag:'blue', t:'Resumen Ejecutivo', s:'Resultados clave del periodo'},
{id:'bench', tag:'purple', t:'Benchmark Estratégico', s:'Comparativa vs industria'},
{id:'fb', tag:'cyan', t:'Auditoría Facebook', s:'Rendimiento de canal principal'},
{id:'multi', tag:'pink', t:'Multiplataforma', s:'IG, TikTok y YouTube'},
{id:'web', tag:'blue', t:'Web & User Behavior', s:'Analítica de sitio'},
{id:'ops', tag:'amber', t:'Bitácora Operativa', s:'Registro de ejecución'},
{id:'video', tag:'green', t:'Inventario de Video', s:'Producción audiovisual'},
{id:'plan', tag:'orange', t:'Plan Maestro', s:'Estrategia y roadmap'},
{id:'eval', tag:'red', t:'Evaluación Final', s:'Puntaje del periodo'}
];
const kpiData = {
global: [
{l:'Impresiones', v:'8,076', d:'12%', up:true},
{l:'Compartidos', v:'2,053', d:'8%', up:true},
{l:'Leads', v:'70', d:'3%', up:false}
],
section: [
{l:'FB Seguidores', v:'5,131', d:'4.2%', up:true},
{l:'Engagement', v:'6.8%', d:'1.1%', up:true},
{l:'Publicaciones', v:'1,004', d:null}
]
};
function setMode(mode) {
document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
document.getElementById('btn-'+mode).classList.add('active');
const strip = document.getElementById('kpi-strip');
strip.innerHTML = kpiData[mode].map(k => `
<div class="kpi-pill">
<div class="kpi-h">${k.l}</div>
<div class="kpi-row">
<div class="kpi-v">${k.v}</div>
${k.d ? `<div class="delta ${k.up?'up':'down'}">${k.up?'▲':'▼'} ${k.d}</div>`:''}
</div>
</div>
`).join('');
}
function toggle(id) {
const el = document.getElementById('s-'+id);
const isOpen = el.classList.contains('open');
document.querySelectorAll('.section').forEach(s => s.classList.remove('open'));
if(!isOpen) el.classList.add('open');
document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
const navLink = document.querySelector(`[href="#s-${id}"]`);
if(navLink) navLink.classList.add('active');
}
function navTo(id) {
event.preventDefault();
toggle(id);
const el = document.getElementById('s-'+id);
el.scrollIntoView({behavior:'smooth', block:'start'});
}
function renderContent() {
const container = document.getElementById('main-content');
let html = '';
html += `<div class="section" id="s-exec"><button class="section-header" onclick="toggle('exec')"><span class="tag blue">01</span><span class="s-title">Resumen Ejecutivo</span><span class="s-sub">Resultados clave</span><span class="chevron">▼</span></button><div class="section-body">
<div class="grid">
<div class="col-3"><div class="m-card"><div class="m-label">Impresiones</div><div class="m-value">8,076</div><div class="m-sub"><span class="badge b-green">▲ 12%</span> vs Marzo</div></div></div>
<div class="col-3"><div class="m-card"><div class="m-label">Compartidos</div><div class="m-value">2,053</div><div class="m-sub"><span class="badge b-green">▲ 8%</span> Meta: 2k</div></div></div>
<div class="col-3"><div class="m-card"><div class="m-label">Leads</div><div class="m-value">70</div><div class="m-sub"><span class="badge b-red">▼ 3%</span> Meta: 80</div></div></div>
<div class="col-3"><div class="m-card"><div class="m-label">Conversión</div><div class="m-value">3.4%</div><div class="m-sub"><span class="badge b-amber">Sector 4.1%</span></div></div></div>
</div>
<div class="t-wrap"><table><thead><tr><th>Canal</th><th>Estatus</th><th>Madurez</th><th>Alcance</th><th>Leads</th><th>Tendencia</th></tr></thead><tbody>
<tr class="r-ok"><td class="name">Facebook</td><td><span class="dot-green"></span> Activo</td><td>Madurez</td><td>4,200</td><td>1,130</td><td class="num">Estable ↑</td></tr>
<tr class="r-ok"><td class="name">Instagram</td><td><span class="dot-green"></span> Activo</td><td>Crecimiento</td><td>2,540</td><td>680</td><td class="num">Creciendo ↑</td></tr>
<tr class="r-warn"><td class="name">TikTok</td><td><span class="dot-amber"></span> Prueba</td><td>Exploración</td><td>890</td><td>190</td><td class="num">Variable ~</td></tr>
<tr class="r-bad"><td class="name">YouTube</td><td><span class="dot-red"></span> Pausado</td><td>Latente</td><td>210</td><td>43</td><td class="num">Decayendo ↓</td></tr>
<tr class="r-warn"><td class="name">Web Orgánico</td><td><span class="dot-amber"></span> Optimizar</td><td>Desarrollo</td><td>236</td><td>10</td><td class="num">Estancado ~</td></tr>
</tbody></table></div></div></div>`;
html += `<div class="section" id="s-bench"><button class="section-header" onclick="toggle('bench')"><span class="tag purple">02</span><span class="s-title">Benchmark Estratégico</span><span class="s-sub">Industria</span><span class="chevron">▼</span></button><div class="section-body">
<div class="grid"><div class="col-6">
<div class="p-row"><div class="p-label">Engagement</div><div class="p-track"><div class="p-fill b-green" style="width:68%"></div></div><div class="p-val">6.8%</div></div>
<div class="p-row"><div class="p-label">Alcance</div><div class="p-track"><div class="p-fill b-blue" style="width:54%"></div></div><div class="p-val">5.4%</div></div>
<div class="p-row"><div class="p-label">CTR</div><div class="p-track"><div class="p-fill b-amber" style="width:41%"></div></div><div class="p-val">4.1%</div></div>
<div class="p-row"><div class="p-label">Conversión</div><div class="p-track"><div class="p-fill b-amber" style="width:34%"></div></div><div class="p-val">3.4%</div></div>
<div class="p-row"><div class="p-label">Costo/lead</div><div class="p-track"><div class="p-fill b-red" style="width:85%"></div></div><div class="p-val">$22</div></div>
</div></div>
<div class="t-wrap"><table><thead><tr><th>Métrica</th><th>Valor Primavera</th><th>Media Sector</th><th>Top Target</th><th>Evaluación</th></tr></thead><tbody>
<tr class="r-ok"><td class="name">Engagement FB</td><td>6.8%</td><td>5.2%</td><td>4.9%</td><td><span class="badge b-green">Superior</span></td></tr>
<tr class="r-ok"><td class="name">Reach IG</td><td>12.4K</td><td>9.8K</td><td>8.1K</td><td><span class="badge b-green">Superior</span></td></tr>
<tr class="r-warn"><td class="name">CTR Email</td><td>4.1%</td><td>5.6%</td><td>4.8%</td><td><span class="badge b-amber">Por mejorar</span></td></tr>
<tr class="r-bad"><td class="name">Conversión web</td><td>3.4%</td><td>6.1%</td><td>5.2%</td><td><span class="badge b-red">Alerta</span></td></tr>
<tr class="r-warn"><td class="name">Costo/lead</td><td>$22</td><td>$18</td><td>$19</td><td><span class="badge b-amber">Por mejorar</span></td></tr>
</tbody></table></div></div></div>`;
html += `<div class="section" id="s-fb"><button class="section-header" onclick="toggle('fb')"><span class="tag cyan">03</span><span class="s-title">Auditoría Facebook</span><span class="s-sub">Canal Principal</span><span class="chevron">▼</span></button><div class="section-body">
<div class="grid">
<div class="col-4"><div class="m-card"><div class="m-label">Seguidores</div><div class="m-value">5,131</div><div class="m-sub"><span class="badge b-green">▲ 4.2%</span></div></div></div>
<div class="col-4"><div class="m-card"><div class="m-label">Publicaciones</div><div class="m-value">1,004</div><div class="m-sub">Total Histórico</div></div></div>
<div class="col-4"><div class="m-card"><div class="m-label">Engagement</div><div class="m-value">6.8%</div><div class="m-sub"><span class="badge b-green">Sector 4.9%</span></div></div></div>
</div>
<div class="m-card"><div class="m-label">Mix de Contenido</div><div class="donut-box"><canvas id="fbDonut" width="130" height="130" role="img" aria-label="Mix de contenido FB"></canvas>
<div class="c-leg">
<div class="c-item"><div class="swatch" style="background:#6366f1"></div><div class="c-txt">Video</div><div class="c-val">422</div><div class="c-pct">42%</div></div>
<div class="c-item"><div class="swatch" style="background:#22c55e"></div><div class="c-txt">Imagen</div><div class="c-val">311</div><div class="c-pct">31%</div></div>
<div class="c-item"><div class="swatch" style="background:#f59e0b"></div><div class="c-txt">Enlace</div><div class="c-val">181</div><div class="c-pct">18%</div></div>
<div class="c-item"><div class="swatch" style="background:#3b82f6"></div><div class="c-txt">Evento</div><div class="c-val">90</div><div class="c-pct">9%</div></div>
</div></div></div></div></div>`;
html += `<div class="section" id="s-multi"><button class="section-header" onclick="toggle('multi')"><span class="tag pink">04</span><span class="s-title">Multiplataforma</span><span class="s-sub">IG / TikTok / YT</span><span class="chevron">▼</span></button><div class="section-body">
<div class="t-wrap"><table><thead><tr><th>Plataforma / Tipo</th><th>Vistas</th><th>Engage</th><th>Guardados</th><th>Compartidos</th><th>Nivel</th></tr></thead><tbody>
<tr class="r-ok"><td class="name">Instagram Reel</td><td>4,820</td><td>312</td><td>28</td><td>64</td><td><span class="badge b-green">Top</span></td></tr>
<tr class="r-ok"><td class="name">Instagram Carrusel</td><td>2,100</td><td>198</td><td>41</td><td>22</td><td><span class="badge b-green">Alto</span></td></tr>
<tr class="r-warn"><td class="name">TikTok Video</td><td>890</td><td>76</td><td>9</td><td>18</td><td><span class="badge b-amber">Medio</span></td></tr>
<tr class="r-warn"><td class="name">TikTok Post</td><td>430</td><td>31</td><td>4</td><td>7</td><td><span class="badge b-amber">Bajo</span></td></tr>
<tr class="r-bad"><td class="name">YouTube Video</td><td>210</td><td>14</td><td>2</td><td>3</td><td><span class="badge b-red">Pausar</span></td></tr>
</tbody></table></div></div></div>`;
